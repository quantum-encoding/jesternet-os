# ============================================================================
# JesterNet OS Enterprise Deployment Configuration
# ============================================================================
# Copy this file and customize for your organization's deployment.
# Usage: ./install.sh your-config.conf
# ============================================================================

# ----------------------------------------------------------------------------
# Basic System Configuration
# ----------------------------------------------------------------------------

# Target disk for installation (REQUIRED)
# Use "auto" to auto-detect single disk, or specify exact path
TARGET_DISK="/dev/sda"

# System identity
HOSTNAME="workstation-001"
USERNAME="employee"
USER_PASSWORD="changeme123"       # Change this! Or leave empty for interactive

# Regional settings
TIMEZONE="America/New_York"
LOCALE="en_US.UTF-8"
KEYMAP="us"
MIRROR_COUNTRY="US"               # ISO 3166-1 alpha-2 (US, DE, GB, AU, etc.)

# ----------------------------------------------------------------------------
# Partition Layout (sizes in GB)
# ----------------------------------------------------------------------------
# Set to "auto" for smart sizing based on disk size, or specify exact values
#
# Auto-sizing reference (for ROOT_SIZE="auto"):
#   < 64GB disk   → 25GB root
#   64-128GB      → 30GB root
#   128-256GB     → 50GB root
#   256-512GB     → 80GB root
#   512GB-1TB     → 150GB root
#   1-2TB         → 200GB root
#   2-4TB         → 250GB root
#   4TB+          → 300GB root (cap)

EFI_SIZE="1"                      # EFI System Partition (always 1GB)
SWAP_SIZE="auto"                  # "auto" or exact GB (auto: 2-32GB based on disk)
ROOT_SIZE="auto"                  # "auto" or exact GB (auto: 25-300GB based on disk)
# HOME gets the remaining space

# ----------------------------------------------------------------------------
# Desktop Configuration
# ----------------------------------------------------------------------------

# Desktop style: "dock" (macOS-like) or "taskbar" (Windows-like)
DESKTOP_STYLE="dock"

# Development stacks (space-separated)
# Options: tauri android go python zig web office creator
# Leave empty for none, or use "all" for everything
DEV_STACKS=""

# ----------------------------------------------------------------------------
# Network Configuration
# ----------------------------------------------------------------------------

# Static IP (leave empty for DHCP)
STATIC_IP=""                      # e.g., "192.168.1.100/24"
GATEWAY=""                        # e.g., "192.168.1.1"
DNS_SERVERS=""                    # e.g., "192.168.1.1,8.8.8.8"

# Proxy (leave empty for no proxy)
HTTP_PROXY=""                     # e.g., "http://proxy.corp.com:8080"
HTTPS_PROXY=""                    # Defaults to HTTP_PROXY if not set

# ----------------------------------------------------------------------------
# Remote Access
# ----------------------------------------------------------------------------

SSH_ENABLED="true"                # Enable SSH server
SSH_AUTHORIZED_KEYS=""            # Path to authorized_keys file to inject

# ----------------------------------------------------------------------------
# Enterprise / Domain Integration
# ----------------------------------------------------------------------------

# Prepare for Active Directory / LDAP domain join
DOMAIN_JOIN_PREP="false"
DOMAIN_REALM=""                   # e.g., "CORP.EXAMPLE.COM"

# ----------------------------------------------------------------------------
# Custom Post-Install Hook
# ----------------------------------------------------------------------------

# Path to a custom script to run at the end of installation
# This runs inside the chroot environment with full access
POST_INSTALL_HOOK=""              # e.g., "/path/to/custom-setup.sh"

# ----------------------------------------------------------------------------
# Installation Behavior
# ----------------------------------------------------------------------------

# Silent mode - no interactive prompts (requires all config to be set)
SILENT_MODE="true"

# ============================================================================
# Example Fleet Deployment
# ============================================================================
#
# For mass deployments, create a base config and generate per-machine configs:
#
#   #!/bin/bash
#   for i in {001..100}; do
#       sed "s/workstation-001/workstation-$i/" enterprise-config.conf > "machines/config-$i.conf"
#   done
#
# Then deploy via PXE boot, Ventoy USB, or network install with:
#
#   curl -sL https://yourserver/install.sh | bash -s -- config-001.conf
#
# ============================================================================
